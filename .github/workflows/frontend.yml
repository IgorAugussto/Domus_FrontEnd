name: Frontend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd domus-frontend
        npm install  # Sem cd, raiz é o frontend!

    - name: Build frontend
      run: |
        cd domus-frontend
        npm install

    - name: Build Docker Image
      run: |
        cd domus-frontend
        docker build -t igoraugusto/domus-frontend:latest .  # Adicione um Dockerfile na raiz se quiser

    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      run: docker push igoraugusto/domus-frontend:latest
